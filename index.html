<!doctype html>
<html lang="en-nz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hauraki Gulf Wind</title>
<link rel="icon" href="data:,">
<style>
  [data-theme="night"]{
    --bg:#081320; --tile-bg:#102234; --text:#eef5fc; --muted:#8aa4ba; --line:#284665;
    --calm:#3ddc84; --mod:#5ec8ff; --fresh:#ffb84d; --gale:#ff6b78;
  }
  [data-theme="day"]{
    --bg:#c5d3df; --tile-bg:#ffffff; --text:#0b1a27; --muted:#566f83; --line:#a7bacb;
    --calm:#0f9d52; --mod:#0277c2; --fresh:#c8780a; --gale:#d6303f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
    height:100dvh;
    padding:clamp(8px,1.4vw,18px); gap:clamp(8px,1.2vw,14px);
    transition:background .25s, color .25s;
  }

  header{display:flex;align-items:center;gap:clamp(8px,1.4vw,16px);flex:0 0 auto}
  h1{font-size:clamp(15px,1.8vw,23px);margin:0;font-weight:700;letter-spacing:.3px;white-space:nowrap}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:clamp(10px,1.1vw,13px);
    font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--calm)}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--calm);animation:pulse 1.6s infinite}
  .live.stale{color:var(--muted)} .live.stale .dot{background:var(--muted);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(90,200,130,.5)}70%{box-shadow:0 0 0 9px rgba(90,200,130,0)}100%{box-shadow:0 0 0 0 rgba(90,200,130,0)}}
  .updated{color:var(--muted);font-size:clamp(10px,1.1vw,13px);font-variant-numeric:tabular-nums;white-space:nowrap}
  .spacer{flex:1}
  header button{background:var(--tile-bg);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-size:16px;line-height:1;cursor:pointer;transition:.15s}
  header button:hover{border-color:var(--mod);color:var(--mod)}
  #stationMenuBtn[aria-expanded="true"]{border-color:var(--mod);color:var(--mod)}

  main{flex:1;min-height:0;display:grid;gap:clamp(8px,1.1vw,15px);
    grid-template-columns:repeat(var(--cols,4),minmax(0,1fr));
    grid-template-rows:repeat(var(--rows,2),minmax(0,1fr));grid-auto-rows:unset}
  @media(max-width:1000px){
    main{grid-template-columns:repeat(var(--p-cols,2),minmax(0,1fr));
      grid-template-rows:repeat(var(--p-rows,4),minmax(0,1fr))}
  }

  .tile{
    position:relative;overflow:hidden;border-radius:clamp(12px,1.2vw,18px);
    background:color-mix(in srgb, var(--c,var(--line)) 9%, var(--tile-bg));
    border:1px solid color-mix(in srgb, var(--c,var(--line)) 32%, var(--line));
    padding:clamp(10px,1.3vw,20px) clamp(13px,1.6vw,24px);
    display:flex;flex-direction:column;justify-content:space-between;gap:6px;min-height:0;
    transition:background .25s,border-color .25s;
  }
  .tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c,var(--line));z-index:1}
  .tile.offline{opacity:.5}
  .graph{position:absolute;inset:0;z-index:0;pointer-events:none}
  .graph svg{width:100%;height:100%;display:block}
  .thead,.mid,.foot{position:relative;z-index:1}
  .tile[data-band=calm]{--c:var(--calm)}
  .tile[data-band=mod]{--c:var(--mod)}
  .tile[data-band=fresh]{--c:var(--fresh)}
  .tile[data-band=gale]{--c:var(--gale)}

  .thead{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .name{font-size:clamp(13px,1.5vw,20px);font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .age{font-size:clamp(10px,1vw,13px);color:var(--muted);white-space:nowrap;flex:0 0 auto}
  .age.stale{color:var(--fresh)} .age.off{color:var(--gale);font-weight:700}

  .mid{display:flex;align-items:baseline;gap:clamp(8px,1vw,18px);flex-wrap:wrap}
  .spd{font-size:clamp(48px,8.5vw,118px);line-height:.8;font-weight:800;
    color:var(--c,var(--text));font-variant-numeric:tabular-nums;letter-spacing:-2px}
  .spd .u{font-size:.26em;color:var(--muted);font-weight:600;margin-left:.1em;letter-spacing:0}
  .gst{font-size:clamp(22px,3.3vw,46px);font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;line-height:1}
  .gst em{color:var(--muted);font-weight:600;font-style:normal;font-size:.62em}

  .foot{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .dirwrap{display:flex;align-items:center;gap:clamp(6px,.8vw,12px)}
  .dirwrap svg{display:block;width:clamp(30px,4vw,58px);height:clamp(30px,4vw,58px)}
  .card{font-size:clamp(22px,3.1vw,46px);font-weight:800;color:var(--text);letter-spacing:.5px;line-height:1}
  .deg{font-size:clamp(11px,1.1vw,15px);color:var(--muted);font-weight:600}
  .bl{font-size:clamp(11px,1.15vw,16px);font-weight:800;letter-spacing:.6px;text-transform:uppercase;
    color:var(--c,var(--muted));padding:5px 11px;border-radius:999px;white-space:nowrap;
    background:color-mix(in srgb, var(--c,var(--line)) 18%, transparent)}
  .err{color:var(--gale);font-weight:700;font-size:clamp(13px,1.4vw,18px)}

  footer{flex:0 0 auto;color:var(--muted);font-size:clamp(9px,.92vw,12px);text-align:center;opacity:.85}
  footer a{color:inherit}

  .panel[hidden]{display:none}
  .panel{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.44);display:flex;align-items:center;justify-content:center;
    padding:clamp(10px,2vw,24px)}
  .sheet{width:min(960px,100%);max-height:min(760px,92dvh);background:var(--tile-bg);color:var(--text);
    border:1px solid var(--line);border-radius:14px;display:grid;grid-template-rows:auto auto 1fr auto;
    overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.35)}
  .sheet-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .sheet-head h2{font-size:18px;line-height:1;margin:0;letter-spacing:0;font-weight:800}
  .count{color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap}
  .iconbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--text);
    display:grid;place-items:center;font-size:20px;line-height:1;cursor:pointer}
  .iconbtn:hover{border-color:var(--mod);color:var(--mod)}
  .sheet-tools{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .search{width:100%;border:1px solid var(--line);border-radius:8px;background:color-mix(in srgb, var(--bg) 22%, var(--tile-bg));
    color:var(--text);font:inherit;font-size:15px;padding:10px 12px;outline:none}
  .search:focus{border-color:var(--mod)}
  .reset{border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--text);font-weight:800;padding:0 12px;cursor:pointer}
  .reset:hover{border-color:var(--mod);color:var(--mod)}
  .picker{min-height:0;display:grid;grid-template-columns:minmax(190px,240px) 1fr}
  .regions{min-height:0;overflow:auto;border-right:1px solid var(--line);padding:8px;display:flex;flex-direction:column;gap:4px}
  .region{border:0;border-radius:8px;background:transparent;color:var(--text);text-align:left;padding:9px 10px;font-weight:750;
    display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
  .region:hover,.region.active{background:color-mix(in srgb, var(--mod) 14%, transparent)}
  .region small{color:var(--muted);font-size:11px;font-weight:800}
  .station-list{min-height:0;overflow:auto;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:6px;align-content:start}
  .station-option{border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--text);padding:9px 10px;
    display:grid;grid-template-columns:auto 1fr;gap:9px;align-items:start;cursor:pointer;min-width:0}
  .station-option:hover{border-color:var(--mod)}
  .station-option.selected{background:color-mix(in srgb, var(--mod) 13%, transparent);border-color:color-mix(in srgb, var(--mod) 70%, var(--line))}
  .station-option.disabled{opacity:.45;cursor:not-allowed}
  .station-option input{margin:2px 0 0;accent-color:var(--mod)}
  .station-name{display:block;font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .station-meta{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{color:var(--muted);padding:18px;font-weight:700}
  .sheet-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;border-top:1px solid var(--line)}
  .hint{color:var(--muted);font-size:12px;font-weight:700}
  .done{border:1px solid var(--mod);border-radius:8px;background:var(--mod);color:#06111a;font-weight:900;padding:9px 14px;cursor:pointer}

  @media(max-width:700px) and (orientation:portrait){
    body{padding:6px;gap:6px;overflow:hidden}
    header{gap:6px;min-height:30px}
    h1{font-size:14px;letter-spacing:0}
    .live{gap:4px;font-size:9px;letter-spacing:.4px}
    .live .dot{width:7px;height:7px}
    .updated{font-size:9px}
    header button{width:30px;height:30px;padding:0;border-radius:8px;font-size:14px;display:grid;place-items:center}
    main{gap:6px;grid-template-columns:repeat(var(--p-cols,2),minmax(0,1fr));
      grid-template-rows:repeat(var(--p-rows,4),minmax(0,1fr));grid-auto-rows:unset}
    .tile{border-radius:10px;padding:8px 9px 8px 12px;gap:3px}
    .tile::before{width:4px}
    .thead{gap:4px}
    .name{font-size:clamp(10px,3vw,13px);letter-spacing:.2px}
    .age{font-size:9px}
    .mid{gap:5px}
    .spd{font-size:clamp(34px,12vw,48px);letter-spacing:-1px}
    .gst{font-size:clamp(16px,5vw,22px)}
    .foot{gap:5px}
    .dirwrap{gap:4px}
    .dirwrap svg{width:24px;height:24px}
    .card{font-size:clamp(17px,5vw,22px);letter-spacing:0}
    .deg{font-size:9px}
    .bl{font-size:9px;letter-spacing:.3px;padding:3px 6px}
    footer{font-size:8px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .panel{padding:0;align-items:stretch;justify-content:stretch}
    .sheet{width:100%;max-height:none;height:100dvh;border-radius:0;border:0}
    .sheet-head{padding:12px}
    .sheet-tools{grid-template-columns:1fr;gap:8px;padding:10px 12px}
    .reset{height:36px}
    .picker{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .regions{border-right:0;border-bottom:1px solid var(--line);display:flex;flex-direction:row;overflow-x:auto;padding:8px 10px}
    .region{white-space:nowrap;flex:0 0 auto}
    .station-list{grid-template-columns:1fr;padding:8px 10px}
    .sheet-foot{padding:10px 12px}
  }

  @media(max-width:430px) and (orientation:portrait){
    .updated{display:none}
  }

  @media(max-height:560px) and (orientation:landscape){
    body{padding:6px;gap:6px;overflow:hidden}
    header{gap:6px;min-height:28px}
    h1{font-size:14px;letter-spacing:0}
    .live{gap:4px;font-size:9px;letter-spacing:.4px}
    .live .dot{width:7px;height:7px}
    .updated{font-size:9px}
    header button{width:28px;height:28px;padding:0;border-radius:8px;font-size:13px;display:grid;place-items:center}
    main{gap:6px;grid-template-columns:repeat(var(--l-cols,4),minmax(0,1fr));
      grid-template-rows:repeat(var(--l-rows,2),minmax(0,1fr));grid-auto-rows:unset}
    .tile{border-radius:10px;padding:7px 8px 7px 11px;gap:3px}
    .tile::before{width:4px}
    .thead{gap:4px}
    .name{font-size:clamp(10px,1.6vw,13px);letter-spacing:.2px}
    .age{font-size:9px}
    .mid{gap:5px}
    .spd{font-size:clamp(30px,6vw,54px);letter-spacing:-1px}
    .gst{font-size:clamp(15px,2.6vw,22px)}
    .foot{gap:5px}
    .dirwrap{gap:4px}
    .dirwrap svg{width:22px;height:22px}
    .card{font-size:clamp(16px,3vw,22px);letter-spacing:0}
    .deg{font-size:9px}
    .bl{font-size:9px;letter-spacing:.3px;padding:3px 6px}
    footer{display:none}
    .panel{padding:0}
    .sheet{width:100%;height:100dvh;max-height:none;border-radius:0;border:0}
    .sheet-head{padding:8px 12px}
    .sheet-head h2{font-size:16px}
    .sheet-tools{grid-template-columns:1fr auto;padding:8px 12px}
    .search{padding:8px 10px;font-size:14px}
    .picker{grid-template-columns:190px 1fr}
    .regions{padding:6px}
    .region{padding:7px 8px}
    .station-list{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));padding:6px}
    .station-option{padding:7px 8px}
    .sheet-foot{padding:8px 12px}
  }
</style>
</head>
<body>
  <header>
    <h1>Hauraki Gulf Wind</h1>
    <span class="live" id="live"><span class="dot"></span>Live</span>
    <span class="updated" id="updated">loading…</span>
    <span class="spacer"></span>
    <button id="theme" title="Day / night">☀</button>
    <button id="fs" title="Fullscreen">⛶</button>
    <button id="refresh" title="Refresh now">↻</button>
    <button id="stationMenuBtn" title="Stations" aria-label="Open station menu" aria-controls="stationPanel" aria-expanded="false">☰</button>
  </header>

  <main id="grid"></main>

  <footer>
    Live anemometer data via <a href="https://www.zephyrapp.nz" target="_blank" rel="noopener">Zephyr</a> · winds in knots, arrow points downwind, label is the direction it's <b>from</b> · Tāmaki Strait Buoy stands in for Bastion Point
  </footer>

  <div class="panel" id="stationPanel" hidden>
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="stationPanelTitle">
      <div class="sheet-head">
        <h2 id="stationPanelTitle">Stations</h2>
        <span class="count" id="stationCount">8 / 8</span>
        <span class="spacer"></span>
        <button class="iconbtn" id="closeStationPanel" title="Close" aria-label="Close station menu">×</button>
      </div>
      <div class="sheet-tools">
        <input class="search" id="stationSearch" type="search" autocomplete="off" placeholder="Search NZ stations">
        <button class="reset" id="resetStations" type="button">Reset Gulf</button>
      </div>
      <div class="picker">
        <nav class="regions" id="stationRegions" aria-label="Station regions"></nav>
        <div class="station-list" id="stationList"></div>
      </div>
      <div class="sheet-foot">
        <span class="hint" id="stationHint">Choose up to 8 stations</span>
        <button class="done" id="doneStations" type="button">Done</button>
      </div>
    </section>
  </div>

<script>
// Default Zephyr station _ids (proxied through /api so hosted browsers are not blocked by CORS)
const DEFAULT_STATIONS = [
  { id:"6631d5ddcf26372d5b80413b", name:"Passage Rock", regionId:"auckland", lon:175.116978, lat:-36.846853 },
  { id:"68f65b7ce3323e552ce3b2a5", name:"Tāmaki Strait", regionId:"auckland", lon:175.016, lat:-36.8495 },
  { id:"69f7dd013fd033f10b5f8696", name:"Tiritiri Matangi", regionId:"auckland", lon:174.897602, lat:-36.605631 },
  { id:"6631d5ddcf26372d5b8040a2", name:"Channel Island", regionId:"coromandel", lon:175.331264, lat:-36.421878 },
  { id:"6631d5ddcf26372d5b80414c", name:"Te Kouma Heads", regionId:"coromandel", lon:175.427651, lat:-36.820377 },
  { id:"6631d5ddcf26372d5b804176", name:"Manukau Head", regionId:"waikato", lon:174.539516, lat:-37.049885 },
  { id:"68f65ba0e3323e552ce3b2dc", name:"Rangitoto Buoy", regionId:"auckland", lon:174.8035, lat:-36.7737 },
  { id:"6631d5ddcf26372d5b8040c0", name:"Whangaparāoa", regionId:"auckland", lon:174.836445, lat:-36.602767 },
];

const API_BASE = "/api";
const MAX_STATIONS = 8;
const STATION_STORE = "hauraki-selected-stations-v2";
const KMH_TO_KN = 1/1.852;
const DIRS = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
const compass = deg => DIRS[Math.round(((deg%360)/22.5))%16];
const bandKey  = kn => kn<11?"calm":kn<21?"mod":kn<31?"fresh":"gale";
const bandLabel= kn => kn<11?"Light":kn<21?"Moderate":kn<31?"Fresh":kn<34?"Strong":"Gale";
function ageText(iso){
  if(!iso) return "";
  const m=Math.round((Date.now()-new Date(iso).getTime())/60000);
  if(m<1) return "now"; if(m<60) return m+"m"; return Math.floor(m/60)+"h";
}

const grid=document.getElementById("grid");
const updatedEl=document.getElementById("updated");
const liveEl=document.getElementById("live");
const menuBtn=document.getElementById("stationMenuBtn");
const stationPanel=document.getElementById("stationPanel");
const closePanelBtn=document.getElementById("closeStationPanel");
const doneStationsBtn=document.getElementById("doneStations");
const resetStationsBtn=document.getElementById("resetStations");
const stationSearch=document.getElementById("stationSearch");
const stationRegions=document.getElementById("stationRegions");
const stationList=document.getElementById("stationList");
const stationCount=document.getElementById("stationCount");
const stationHint=document.getElementById("stationHint");

const REGION_DEFS = [
  { id:"selected", label:"Selected" },
  { id:"northland", label:"Northland & Bay of Islands" },
  { id:"auckland", label:"Auckland & Hauraki Gulf" },
  { id:"coromandel", label:"Coromandel & Bay of Plenty" },
  { id:"waikato", label:"Waikato & West Coast" },
  { id:"taranaki", label:"Taranaki & Manawatū" },
  { id:"wellington", label:"Wellington & Cook Strait" },
  { id:"tasman", label:"Tasman & Marlborough Sounds" },
  { id:"canterbury", label:"Canterbury & Kaikōura" },
  { id:"south", label:"Otago, Southland & Fiordland" },
  { id:"inland", label:"Lakes & Inland NZ" },
  { id:"other", label:"Other NZ" },
];
const REGION_BY_ID = Object.fromEntries(REGION_DEFS.map(r=>[r.id,r]));
const DEFAULT_BY_ID = Object.fromEntries(DEFAULT_STATIONS.map(s=>[
  s.id,
  { ...s, region:REGION_BY_ID[s.regionId]?.label || "Auckland & Hauraki Gulf", source:"Zephyr", search:"" }
]));

let selectedIds = loadSelectedIds();
let stationCatalog = [];
let stationById = { ...DEFAULT_BY_ID };
let catalogLoaded = false;
let activeRegion = "selected";
let searchTerm = "";
let cards = [];
let displayLayoutKey = "";
let resizeTimer = null;

function escapeHTML(v){
  return String(v).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function searchKey(v){
  return String(v || "").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}
function sourceLabel(type){
  return ({metservice:"MetService",ac:"Buoy",holfuy:"Holfuy",tempest:"Tempest",windy:"Windy",windguru:"Windguru",cp:"Port",harvest:"Harvest"})[type] || "Zephyr";
}
function regionIdFor(lon, lat){
  if(!Number.isFinite(lon) || !Number.isFinite(lat)) return "other";
  if(lat>-35.55) return "northland";
  if(lat>-37.35 && lon>=173.7 && lon<176.0) return "auckland";
  if(lat>-38.85 && lon>=175.0 && lon<178.9) return "coromandel";
  if(lat>-39.35 && lon<175.35) return "waikato";
  if(lat>-40.85 && lon<176.35) return "taranaki";
  if(lat>-41.9 && lon<176.8) return "wellington";
  if(lat>-42.75 && lon>=171.0 && lon<174.8) return "tasman";
  if(lat>-44.85 && lon>=170.0) return "canterbury";
  if(lat<=-44.85 || (lat<-43.0 && lon<170.0)) return "south";
  if(lon>=174.0 && lon<177.0 && lat<=-37.0 && lat>-40.2) return "inland";
  return "other";
}
function normalizeStation(st){
  const coords = st.location?.coordinates || [];
  const lon = Number(coords[0]), lat = Number(coords[1]);
  const id = st._id || st.id;
  if(!id || !st.name || !Number.isFinite(lon) || !Number.isFinite(lat)) return null;
  if(lat<-48 || lat>-33 || lon<165 || lon>180) return null;
  const regionId = regionIdFor(lon, lat);
  const region = REGION_BY_ID[regionId]?.label || "Other NZ";
  const source = sourceLabel(st.type);
  return {
    id, name:st.name, regionId, region, source, type:st.type || "", lon, lat,
    isOffline:!!st.isOffline, lastUpdate:st.lastUpdate || "",
    search:searchKey(`${st.name} ${region} ${source} ${st.type || ""}`)
  };
}
function loadSelectedIds(){
  try{
    const ids = JSON.parse(localStorage.getItem(STATION_STORE) || "[]");
    if(Array.isArray(ids)){
      const clean = [...new Set(ids.filter(id=>typeof id==="string"))].slice(0,MAX_STATIONS);
      if(clean.length) return clean;
    }
  }catch(e){}
  return DEFAULT_STATIONS.map(s=>s.id);
}
function saveSelectedIds(){
  localStorage.setItem(STATION_STORE, JSON.stringify(selectedIds));
}
function updateCatalog(list){
  const wasLoaded = catalogLoaded;
  const catalog = list.map(normalizeStation).filter(Boolean)
    .sort((a,b)=>a.region.localeCompare(b.region) || a.name.localeCompare(b.name));
  stationCatalog = catalog;
  stationById = { ...DEFAULT_BY_ID };
  for(const st of catalog){
    const preferred = DEFAULT_BY_ID[st.id];
    stationById[st.id] = preferred ? { ...st, name:preferred.name } : st;
  }
  catalogLoaded = true;
  if(!wasLoaded){
    buildCards();
    setTimeout(fetchHistory,0);
  }
  renderStationMenu();
}
function getSelectedStations(){
  return selectedIds.map(id=>stationById[id] || DEFAULT_BY_ID[id] || { id, name:"Station", region:"Other NZ", regionId:"other", source:"Zephyr" });
}
function gridPlan(n, maxCols){
  if(n<=1) return {cols:1, rows:1};
  if(maxCols===2){
    const cols = Math.min(2,n);
    return {cols, rows:Math.ceil(n/cols)};
  }
  if(n<=2) return {cols:n, rows:1};
  if(n<=4) return {cols:2, rows:Math.ceil(n/2)};
  if(n<=6) return {cols:3, rows:2};
  return {cols:4, rows:Math.ceil(n/4)};
}
function currentGridPlan(n){
  const count = Math.max(1,n);
  if(matchMedia("(max-height:560px) and (orientation:landscape)").matches) return gridPlan(count,4);
  if(matchMedia("(max-width:1000px)").matches) return gridPlan(count,2);
  return gridPlan(count,4);
}
function hasLocation(st){
  return Number.isFinite(st.lon) && Number.isFinite(st.lat);
}
function stationOrderTie(a,b){
  return a.st.name.localeCompare(b.st.name) || a.i-b.i;
}
function arrangeStationsForGrid(stations, cols){
  if(stations.length<2) return stations;
  const sorted = stations.map((st,i)=>({st,i})).sort((a,b)=>{
    const hasA = hasLocation(a.st), hasB = hasLocation(b.st);
    if(hasA && hasB) return b.st.lat-a.st.lat || a.st.lon-b.st.lon || stationOrderTie(a,b);
    if(hasA!==hasB) return hasA ? -1 : 1;
    return stationOrderTie(a,b);
  });
  const arranged = [];
  for(let i=0;i<sorted.length;i+=cols){
    arranged.push(...sorted.slice(i,i+cols).sort((a,b)=>{
      const hasA = hasLocation(a.st), hasB = hasLocation(b.st);
      if(hasA && hasB) return a.st.lon-b.st.lon || b.st.lat-a.st.lat || stationOrderTie(a,b);
      if(hasA!==hasB) return hasA ? -1 : 1;
      return stationOrderTie(a,b);
    }));
  }
  return arranged.map(item=>item.st);
}
function getDisplayStations(){
  const stations = getSelectedStations();
  return arrangeStationsForGrid(stations, currentGridPlan(stations.length).cols);
}
function currentDisplayLayoutKey(){
  const stations = getSelectedStations();
  const plan = currentGridPlan(stations.length);
  return `${plan.cols}x${plan.rows}:${arrangeStationsForGrid(stations, plan.cols).map(s=>s.id).join("|")}`;
}
function ensureDisplayLayout(){
  const key = currentDisplayLayoutKey();
  if(key===displayLayoutKey) return false;
  buildCards();
  return true;
}
function scheduleDisplayLayoutCheck(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    if(ensureDisplayLayout()){
      refreshAll();
      fetchHistory();
    }
  }, 160);
}
function applyGridLayout(n){
  const count = Math.max(1,n);
  const desktop = gridPlan(count,4);
  const portrait = gridPlan(count,2);
  const landscape = gridPlan(count,4);
  grid.style.setProperty("--cols", desktop.cols);
  grid.style.setProperty("--rows", desktop.rows);
  grid.style.setProperty("--p-cols", portrait.cols);
  grid.style.setProperty("--p-rows", portrait.rows);
  grid.style.setProperty("--l-cols", landscape.cols);
  grid.style.setProperty("--l-rows", landscape.rows);
  grid.dataset.count = String(n);
}
function buildCards(){
  const stations = getDisplayStations();
  grid.innerHTML = "";
  applyGridLayout(stations.length);
  cards = stations.map(s=>{
    const el=document.createElement("section");
    el.className="tile";
    el.dataset.id=s.id;
    el.innerHTML=`
      <div class="graph"></div>
      <div class="thead"><span class="name">${escapeHTML(s.name)}</span><span class="age"></span></div>
      <div class="mid"><div class="spd">–<span class="u">kn</span></div><div class="gst">G –</div></div>
      <div class="foot"></div>`;
    grid.appendChild(el);
    return el;
  });
  updateStationCount();
  displayLayoutKey = currentDisplayLayoutKey();
}

async function fetchAll(){
  const r=await fetch(`${API_BASE}/stations?_=${Date.now()}`);
  if(!r.ok) throw new Error("HTTP "+r.status);
  const list = await r.json();
  updateCatalog(list);
  const byId={}; for(const st of list) byId[st._id]=st; return byId;
}

function renderStation(el, st){
  if(!el) return;
  if(!st){ el.removeAttribute("data-band"); el.querySelector(".age").textContent="";
    el.querySelector(".mid").innerHTML='<span class="err">no data</span>';
    el.querySelector(".foot").innerHTML=""; return; }
  el.classList.toggle("offline", !!st.isOffline);
  const avg = st.currentAverage!=null?Math.round(st.currentAverage*KMH_TO_KN):null;
  const gust= st.currentGust!=null?Math.round(st.currentGust*KMH_TO_KN):null;
  const hero= avg!=null?avg:gust;

  if(hero!=null) el.dataset.band=bandKey(hero); else el.removeAttribute("data-band");

  const ageEl=el.querySelector(".age");
  const mins= st.lastUpdate?(Date.now()-new Date(st.lastUpdate).getTime())/60000:999;
  ageEl.textContent= st.isOffline?"OFFLINE":ageText(st.lastUpdate);
  ageEl.className="age"+(st.isOffline?" off":mins>40?" stale":"");

  el.querySelector(".mid").innerHTML=
    `<div class="spd">${hero??"–"}<span class="u">kn</span></div>`+
    `<div class="gst">${gust!=null?`<em>G</em> ${gust}`:`<em>G</em> –`}</div>`;

  const dir=st.currentBearing;
  const arrow = dir!=null
    ? `<svg viewBox="0 0 22 22"><path d="M11 2 L15 18 L11 14 L7 18 Z" fill="var(--c,currentColor)" transform="rotate(${(dir+180)%360} 11 11)"/></svg>`
    : "";
  const dirtxt = dir!=null
    ? `<span class="card">${compass(dir)}</span><span class="deg">${Math.round(dir)}°</span>`
    : `<span class="card">–</span>`;
  el.querySelector(".foot").innerHTML=
    `<div class="dirwrap">${arrow}${dirtxt}</div>`+
    `<span class="bl">${hero!=null?bandLabel(hero):"—"}</span>`;
}

// ---- 2-hour history graphs (Strava-elevation style, behind each tile) ----
const histById={};
function twoHourPoints(list){
  const cutoff=Date.now()-2*60*60*1000;
  return list
    .filter(d=>d.windAverage!=null && new Date(d.time).getTime()>=cutoff)
    .map(d=>({t:new Date(d.time).getTime(), v:d.windAverage*KMH_TO_KN}))
    .sort((a,b)=>a.t-b.t);
}
function smoothLine(P){
  if(P.length<2) return "";
  if(P.length===2) return `M ${P[0].x.toFixed(2)} ${P[0].y.toFixed(2)} L ${P[1].x.toFixed(2)} ${P[1].y.toFixed(2)}`;
  let d=`M ${P[0].x.toFixed(2)} ${P[0].y.toFixed(2)}`;
  for(let i=0;i<P.length-1;i++){
    const p0=P[i-1]||P[i], p1=P[i], p2=P[i+1], p3=P[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d+=` C ${c1x.toFixed(2)} ${c1y.toFixed(2)} ${c2x.toFixed(2)} ${c2y.toFixed(2)} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }
  return d;
}
function drawGraph(i, pts){
  const g=cards[i]?.querySelector(".graph"); if(!g) return;
  if(!pts || pts.length<2){ g.innerHTML=""; return; }
  const tMin=pts[0].t, tMax=pts[pts.length-1].t, span=Math.max(tMax-tMin,1);
  const maxV=Math.max(...pts.map(p=>p.v), 1);
  const yMax=Math.max(maxV*1.2, 10);                 // auto-scale, with a calm floor
  const P=pts.map(p=>({x:(p.t-tMin)/span*100, y:100-(p.v/yMax)*90}));
  const line=smoothLine(P); if(!line){ g.innerHTML=""; return; }
  const area=`${line} L ${P[P.length-1].x.toFixed(2)} 100 L ${P[0].x.toFixed(2)} 100 Z`;
  g.innerHTML=
    `<svg viewBox="0 0 100 100" preserveAspectRatio="none">`+
      `<defs><linearGradient id="wg${i}" x1="0" y1="0" x2="0" y2="1">`+
        `<stop offset="0%" stop-color="var(--c,var(--mod))" stop-opacity="0.34"/>`+
        `<stop offset="100%" stop-color="var(--c,var(--mod))" stop-opacity="0.03"/>`+
      `</linearGradient></defs>`+
      `<path d="${area}" fill="url(#wg${i})"/>`+
      `<path d="${line}" fill="none" stroke="var(--c,var(--mod))" stroke-opacity="0.6" `+
        `stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>`+
    `</svg>`;
}
async function fetchHistory(){
  ensureDisplayLayout();
  const stations = getDisplayStations();
  await Promise.allSettled(stations.map(async (s,i)=>{
    try{
      const r=await fetch(`${API_BASE}/station-data?id=${encodeURIComponent(s.id)}&_=${Date.now()}`);
      if(!r.ok) return;
      const pts=twoHourPoints(await r.json());
      histById[s.id]=pts; drawGraph(i, pts);
    }catch(e){}
  }));
}

let loading=false, lastUpdated=null, lastOk=false;
function updateClock(){
  if(loading){ updatedEl.textContent="updating…"; return; }
  if(lastUpdated===null) return;
  if(!lastOk){ updatedEl.textContent="offline — retrying"; liveEl.classList.add("stale"); return; }
  const s=Math.round((Date.now()-lastUpdated)/1000);
  updatedEl.textContent="synced "+(s<5?"now":s<60?s+"s ago":Math.floor(s/60)+"m ago");
  liveEl.classList.toggle("stale", s>120);
}
async function refreshAll(){
  if(loading) return;
  ensureDisplayLayout();
  loading=true; updateClock();
  try{
    const byId=await fetchAll();
    getDisplayStations().forEach((s,i)=>renderStation(cards[i], byId[s.id]));
    lastOk=true; lastUpdated=Date.now();
  }catch(e){ lastOk=false; if(lastUpdated===null) cards.forEach(c=>renderStation(c,null)); }
  loading=false; updateClock();
}

function updateStationCount(){
  if(stationCount) stationCount.textContent = `${selectedIds.length} / ${MAX_STATIONS}`;
}
function setStationHint(text){
  stationHint.textContent = text || "Choose up to 8 stations";
}
function regionCounts(){
  const counts = Object.fromEntries(REGION_DEFS.map(r=>[r.id,0]));
  counts.selected = selectedIds.length;
  for(const st of stationCatalog) counts[st.regionId] = (counts[st.regionId] || 0) + 1;
  return counts;
}
function currentStationList(){
  const term = searchKey(searchTerm);
  if(term) return stationCatalog.filter(st=>st.search.includes(term));
  if(activeRegion==="selected") return getDisplayStations();
  return stationCatalog.filter(st=>st.regionId===activeRegion);
}
function renderStationMenu(){
  updateStationCount();
  const counts = regionCounts();
  if(!REGION_BY_ID[activeRegion] || (activeRegion!=="selected" && counts[activeRegion]===0)) activeRegion="selected";

  stationRegions.innerHTML = "";
  for(const region of REGION_DEFS){
    const count = counts[region.id] || 0;
    if(region.id!=="selected" && !count) continue;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "region" + (region.id===activeRegion ? " active" : "");
    btn.dataset.region = region.id;
    btn.innerHTML = `<span>${escapeHTML(region.label)}</span><small>${count}</small>`;
    stationRegions.appendChild(btn);
  }

  stationList.innerHTML = "";
  if(!catalogLoaded && !stationCatalog.length && activeRegion!=="selected"){
    stationList.innerHTML = '<div class="empty">Loading stations…</div>';
    return;
  }
  const list = currentStationList();
  if(!list.length){
    stationList.innerHTML = '<div class="empty">No stations found</div>';
    return;
  }
  for(const st of list){
    const selected = selectedIds.includes(st.id);
    const disabled = !selected && selectedIds.length>=MAX_STATIONS;
    const label = document.createElement("label");
    label.className = "station-option" + (selected ? " selected" : "") + (disabled ? " disabled" : "");
    label.innerHTML = `
      <input type="checkbox" class="station-toggle" data-id="${escapeHTML(st.id)}" ${selected?"checked":""} ${disabled?"disabled":""}>
      <span>
        <span class="station-name">${escapeHTML(st.name)}</span>
        <span class="station-meta">${escapeHTML(st.region || "Other NZ")} · ${escapeHTML(st.source || "Zephyr")}${st.isOffline?" · offline":""}</span>
      </span>`;
    stationList.appendChild(label);
  }
}
function stationSelectionChanged(){
  saveSelectedIds();
  buildCards();
  renderStationMenu();
  refreshAll();
  fetchHistory();
}
function toggleStation(id, wantsSelected){
  const isSelected = selectedIds.includes(id);
  if(wantsSelected && !isSelected){
    if(selectedIds.length>=MAX_STATIONS){
      setStationHint("Maximum 8 stations");
      renderStationMenu();
      return;
    }
    selectedIds = [...selectedIds, id];
    setStationHint("Station added");
    stationSelectionChanged();
    return;
  }
  if(!wantsSelected && isSelected){
    if(selectedIds.length<=1){
      setStationHint("Keep at least one station");
      renderStationMenu();
      return;
    }
    selectedIds = selectedIds.filter(stationId=>stationId!==id);
    setStationHint("Station removed");
    stationSelectionChanged();
  }
}
function openStationPanel(){
  stationPanel.hidden = false;
  menuBtn.setAttribute("aria-expanded","true");
  setStationHint("Choose up to 8 stations");
  renderStationMenu();
  stationSearch.focus({preventScroll:true});
}
function closeStationPanel(){
  stationPanel.hidden = true;
  menuBtn.setAttribute("aria-expanded","false");
  menuBtn.focus({preventScroll:true});
}
menuBtn.onclick = openStationPanel;
closePanelBtn.onclick = closeStationPanel;
doneStationsBtn.onclick = closeStationPanel;
stationPanel.addEventListener("click", e=>{ if(e.target===stationPanel) closeStationPanel(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && !stationPanel.hidden) closeStationPanel(); });
stationSearch.addEventListener("input", e=>{ searchTerm=e.target.value; renderStationMenu(); });
stationRegions.addEventListener("click", e=>{
  const btn = e.target.closest(".region");
  if(!btn) return;
  activeRegion = btn.dataset.region;
  searchTerm = "";
  stationSearch.value = "";
  renderStationMenu();
});
stationList.addEventListener("change", e=>{
  const input = e.target.closest(".station-toggle");
  if(!input) return;
  toggleStation(input.dataset.id, input.checked);
});
resetStationsBtn.onclick = ()=>{
  selectedIds = DEFAULT_STATIONS.map(s=>s.id);
  setStationHint("Hauraki Gulf restored");
  stationSelectionChanged();
};

// theme + kiosk controls
const themeBtn=document.getElementById("theme");
function setTheme(t){ document.body.dataset.theme=t; localStorage.setItem("wind-theme",t); themeBtn.textContent=t==="day"?"🌙":"☀"; }
const hr=new Date().getHours();
setTheme(localStorage.getItem("wind-theme") || ((hr>=6&&hr<19)?"day":"night"));
themeBtn.onclick=()=> setTheme(document.body.dataset.theme==="day"?"night":"day");
document.getElementById("fs").onclick=()=>{ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.(); };
document.getElementById("refresh").onclick=refreshAll;

buildCards();
renderStationMenu();
refreshAll();
fetchHistory();
setInterval(refreshAll, 60*1000);
setInterval(fetchHistory, 5*60*1000);          // history changes slowly; redraw every 5 min
setInterval(updateClock, 1000);
addEventListener("resize", scheduleDisplayLayoutCheck);
addEventListener("orientationchange", scheduleDisplayLayoutCheck);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden){ refreshAll(); fetchHistory(); } });
</script>
